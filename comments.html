<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="임창우의 포털 댓글 게시판"
    >

    <title>댓글 게시판</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/showcase.css">
</head>

<body class="site-page comments-page showcase-inner">
    <a class="skip-link" href="#pageContent">본문으로 바로가기</a>
    <div class="scroll-progress" id="scrollProgress" aria-hidden="true"></div>

    <nav class="inner-page-nav" aria-label="전체 페이지 메뉴">
        <a class="inner-page-brand" href="index.html">CW<span>/26</span></a>
        <div class="inner-page-links">
            <a href="myProfile.html">소개</a>
            <a href="portfolio.html">포트폴리오</a>
            <a href="myClass.html">강의</a>
            <a href="myHoliday.html">일상</a>
            <a href="myTrip.html">여행</a>
            <a href="comments.html" aria-current="page">댓글</a>
        </div>
    </nav>

    <header>
        <p class="inner-kicker">CONNECT · GUEST BOOK</p>
        <h1>💬 댓글 게시판</h1>

        <p>
            포털에 대한 의견이나 응원의 메시지를 남겨 주세요.
        </p>
    </header>

    <main id="pageContent">
        <section>
            <h2>✍️ 댓글 작성</h2>

            <div
                id="loginGuide"
                class="comment-login-guide"
            >
                댓글을 작성하려면 로그인이 필요합니다.

                <a href="login.html">
                    로그인하기
                </a>
            </div>

            <form id="commentForm" hidden>
                <div class="form-group">
                    <label for="commentContent">
                        댓글 내용
                    </label>

                    <textarea
                        id="commentContent"
                        name="commentContent"
                        maxlength="300"
                        placeholder="댓글을 입력해 주세요. 최대 300자입니다."
                        required
                    ></textarea>
                </div>

                <div class="comment-form-footer">
                    <span id="characterCount">
                        0 / 300
                    </span>

                    <button
                        type="submit"
                        id="commentButton"
                    >
                        댓글 등록
                    </button>
                </div>

                <p
                    id="commentMessage"
                    role="status"
                    aria-live="polite"
                ></p>
            </form>
        </section>

        <section>
            <div class="comment-list-heading">
                <h2>📋 등록된 댓글</h2>

                <span id="commentCount">
                    0개
                </span>
            </div>

            <div
                id="commentList"
                class="comment-list"
            >
                <p class="comment-loading">
                    댓글을 불러오는 중입니다.
                </p>
            </div>
        </section>
    </main>

    <footer>
        <p>
            <a href="index.html">
                홈으로 돌아가기
            </a>
        </p>

        <p>
            <small>
                © 2026 임창우 포털 댓글 게시판
            </small>
        </p>
    </footer>

    <script
        type="module"
        src="js/comments.js"
    ></script>
    <script
    type="module"
    src="js/theme.js"
    ></script>
    <script src="js/showcase.js" defer></script>
</body>
</html>
