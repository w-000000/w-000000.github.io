<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="SKALA-FRONT 회원가입 페이지"
    >

    <title>회원가입</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body class="site-page signup-page">
    <header>
        <h1>🧑‍💻 회원가입</h1>

        <p>
            SKALA-FRONT 회원가입을 위해 아래 정보를 입력해 주세요.
        </p>
    </header>

    <main>
        <form id="signupForm">
            <fieldset>
                <legend>계정 정보</legend>

                <div class="form-group">
                    <label for="userId">아이디</label>

                    <input
                        type="email"
                        id="userId"
                        name="userId"
                        placeholder="사용할 아이디를 이메일 형식으로 입력하세요"
                        autocomplete="email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">비밀번호</label>

                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="6자 이상 입력하세요"
                        minlength="6"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="passwordCheck">
                        비밀번호 확인
                    </label>

                    <input
                        type="password"
                        id="passwordCheck"
                        name="passwordCheck"
                        placeholder="비밀번호를 다시 입력하세요"
                        minlength="6"
                        required
                    >
                </div>

            </fieldset>

            <fieldset>
                <legend>개인 정보</legend>

                <div class="form-group">
                    <label for="name">이름</label>

                    <input
                        type="text"
                        id="name"
                        name="name"
                        placeholder="이름을 입력하세요"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="birth">생년월일</label>

                    <input
                        type="date"
                        id="birth"
                        name="birth"
                    >
                </div>

                <div class="form-group">
                    <label for="phone">전화번호</label>

                    <input
                        type="tel"
                        id="phone"
                        name="phone"
                        placeholder="010-0000-0000"
                    >
                </div>

                <div class="form-group">
                    <label for="region">거주 지역</label>

                    <select id="region" name="region">
                        <option value="">
                            지역을 선택하세요
                        </option>

                        <option value="seoul">
                            서울특별시
                        </option>

                        <option value="busan">
                            부산광역시
                        </option>

                        <option value="gwangju">
                            광주광역시
                        </option>

                        <option value="daejeon">
                            대전광역시
                        </option>

                        <option value="jeonju">
                            전주시
                        </option>

                        <option value="other">
                            기타
                        </option>
                    </select>
                </div>
            </fieldset>

            <fieldset>
                <legend>관심 분야</legend>

                <div class="form-group">
                    <p>
                        <strong>
                            관심 있는 분야를 선택하세요.
                        </strong>
                    </p>

                    <div class="inline-group">
                        <label>
                            <input
                                type="checkbox"
                                name="interest"
                                value="frontend"
                            >
                            프론트엔드
                        </label>

                        <label>
                            <input
                                type="checkbox"
                                name="interest"
                                value="backend"
                            >
                            백엔드
                        </label>

                        <label>
                            <input
                                type="checkbox"
                                name="interest"
                                value="fullstack"
                            >
                            풀스택
                        </label>

                        <label>
                            <input
                                type="checkbox"
                                name="interest"
                                value="ai"
                            >
                            인공지능
                        </label>

                        <label>
                            <input
                                type="checkbox"
                                name="interest"
                                value="machineLearning"
                            >
                            머신러닝
                        </label>

                        <label>
                            <input
                                type="checkbox"
                                name="interest"
                                value="data"
                            >
                            데이터 분석
                        </label>

                        <label>
                            <input
                                type="checkbox"
                                name="interest"
                                value="cloud"
                            >
                            클라우드
                        </label>

                        <label>
                            <input
                                type="checkbox"
                                name="interest"
                                value="security"
                            >
                            정보 보안
                        </label>

                        <label>
                            <input
                                type="checkbox"
                                name="interest"
                                value="mobile"
                            >
                            모바일 앱
                        </label>

                        <label>
                            <input
                                type="checkbox"
                                name="interest"
                                value="game"
                            >
                            게임 개발
                        </label>

                        <label>
                            <input
                                type="checkbox"
                                name="interest"
                                value="iot"
                            >
                            IoT
                        </label>

                        <label>
                            <input
                                type="checkbox"
                                name="interest"
                                value="devops"
                            >
                            DevOps
                        </label>

                        <label>
                            <input
                                type="checkbox"
                                name="interest"
                                value="git"
                            >
                            Git &amp; GitHub
                        </label>

                        <label>
                            <input
                                type="checkbox"
                                name="interest"
                                value="uiux"
                            >
                            UI/UX 디자인
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <p>
                        <strong>
                            개발 경험이 있나요?
                        </strong>
                    </p>

                    <div class="inline-group">
                        <label>
                            <input
                                type="radio"
                                name="experience"
                                value="yes"
                                required
                            >
                            있음
                        </label>

                        <label>
                            <input
                                type="radio"
                                name="experience"
                                value="no"
                            >
                            없음
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="experienceLevel">
                        개발 경험 수준
                    </label>

                    <select
                        id="experienceLevel"
                        name="experienceLevel"
                    >
                        <option value="">
                            경험 수준을 선택하세요
                        </option>

                        <option value="beginner">
                            입문
                        </option>

                        <option value="basic">
                            기초
                        </option>

                        <option value="intermediate">
                            중급
                        </option>

                        <option value="advanced">
                            고급
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="favoriteLanguage">
                        가장 관심 있는 프로그래밍 언어
                    </label>

                    <select
                        id="favoriteLanguage"
                        name="favoriteLanguage"
                    >
                        <option value="">
                            언어를 선택하세요
                        </option>

                        <option value="javascript">
                            JavaScript
                        </option>

                        <option value="java">
                            Java
                        </option>

                        <option value="python">
                            Python
                        </option>

                        <option value="cpp">
                            C++
                        </option>

                        <option value="csharp">
                            C#
                        </option>

                        <option value="typescript">
                            TypeScript
                        </option>

                        <option value="other">
                            기타
                        </option>
                    </select>
                </div>
            </fieldset>

            <fieldset>
                <legend>프로필 및 활동 링크</legend>

                <div class="form-group">
                    <label for="github">
                        GitHub 주소
                    </label>

                    <input
                        type="url"
                        id="github"
                        name="github"
                        placeholder="https://github.com/아이디"
                    >
                </div>

                <div class="form-group">
                    <label for="notion">
                        Notion 주소
                    </label>

                    <input
                        type="url"
                        id="notion"
                        name="notion"
                        placeholder="https://www.notion.so/"
                    >
                </div>

                <div class="form-group">
                    <label for="blog">
                        기술 블로그 주소
                    </label>

                    <input
                        type="url"
                        id="blog"
                        name="blog"
                        placeholder="https://"
                    >
                </div>

                <div class="form-group">
                    <label for="portfolio">
                        포트폴리오 주소
                    </label>

                    <input
                        type="url"
                        id="portfolio"
                        name="portfolio"
                        placeholder="https://"
                    >
                </div>

                <div class="form-group">
                    <label for="linkedin">
                        LinkedIn 주소
                    </label>

                    <input
                        type="url"
                        id="linkedin"
                        name="linkedin"
                        placeholder="https://www.linkedin.com/in/"
                    >
                </div>

                <div class="form-group">
                    <label for="project">
                        대표 프로젝트 주소
                    </label>

                    <input
                        type="url"
                        id="project"
                        name="project"
                        placeholder="https://"
                    >
                </div>
            </fieldset>

            <fieldset>
                <legend>추가 정보</legend>

                <div class="form-group">
                    <label for="joinPath">
                        가입 경로
                    </label>

                    <select
                        id="joinPath"
                        name="joinPath"
                    >
                        <option value="">
                            가입 경로를 선택하세요
                        </option>

                        <option value="search">
                            인터넷 검색
                        </option>

                        <option value="friend">
                            친구 추천
                        </option>

                        <option value="school">
                            학교 또는 교육기관
                        </option>

                        <option value="sns">
                            SNS
                        </option>

                        <option value="other">
                            기타
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="goal">
                        학습 목표
                    </label>

                    <select
                        id="goal"
                        name="goal"
                    >
                        <option value="">
                            학습 목표를 선택하세요
                        </option>

                        <option value="employment">
                            취업 준비
                        </option>

                        <option value="project">
                            프로젝트 제작
                        </option>

                        <option value="study">
                            개인 학습
                        </option>

                        <option value="certificate">
                            자격증 준비
                        </option>

                        <option value="career">
                            실무 능력 향상
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="introduction">
                        자기소개
                    </label>

                    <textarea
                        id="introduction"
                        name="introduction"
                        placeholder="자신을 간단하게 소개해 주세요"
                    ></textarea>
                </div>

                <div class="form-group">
                    <label for="expectation">
                        SKALA-FRONT에서 기대하는 점
                    </label>

                    <textarea
                        id="expectation"
                        name="expectation"
                        placeholder="배우고 싶은 내용이나 기대하는 점을 작성해 주세요"
                    ></textarea>
                </div>

                <div class="form-group">
                    <div class="inline-group">
                        <label>
                            <input
                                type="checkbox"
                                id="agreement"
                                name="agreement"
                                value="agree"
                                required
                            >
                            개인정보 수집 및 이용에 동의합니다.
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <div class="inline-group">
                        <label>
                            <input
                                type="checkbox"
                                id="emailAgreement"
                                name="emailAgreement"
                                value="agree"
                            >
                            이메일을 통한 학습 소식 수신에 동의합니다.
                        </label>
                    </div>
                </div>
            </fieldset>

            <p
                id="signupMessage"
                role="status"
                aria-live="polite"
            ></p>

            <div class="button-group">
                <button
                    type="submit"
                    id="signupButton"
                >
                    회원가입
                </button>

                <button type="reset">
                    다시 작성
                </button>
            </div>
        </form>
    </main>

    <footer>
        <p>
            <a href="index.html">
                홈으로 돌아가기
            </a>
        </p>

        <p>
            <small>
                SKALA-FRONT 회원가입 페이지
            </small>
        </p>
    </footer>

    <script
        type="module"
        src="js/signup.js"
    ></script>
</body>
</html>
