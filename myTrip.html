<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta
        name="description"
        content="임창우의 여행 사진과 음악, 영상을 소개하는 페이지"
    >

    <title>나의 여행지</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/showcase.css">
</head>

<body class="site-page trip-page showcase-inner">
    <a class="skip-link" href="#pageContent">본문으로 바로가기</a>
    <div class="scroll-progress" id="scrollProgress" aria-hidden="true"></div>

    <nav class="inner-page-nav" aria-label="전체 페이지 메뉴">
        <a class="inner-page-brand" href="index.html">CW<span>/26</span></a>
        <div class="inner-page-links">
            <a href="myProfile.html">소개</a>
            <a href="portfolio.html">포트폴리오</a>
            <a href="myClass.html">강의</a>
            <a href="myHoliday.html">일상</a>
            <a href="myTrip.html" aria-current="page">여행</a>
            <a href="comments.html">댓글</a>
        </div>
    </nav>

    <header>
        <p class="inner-kicker">ARCHIVE · PLACES &amp; MOMENTS</p>
        <h1>🌍 나의 여행 앨범</h1>

        <p>
            기억에 남는 여행 사진과 음악, 영상을 소개합니다.
        </p>
    </header>

    <main id="pageContent">
        <div class="container">
            <section>
                <h2>🎵 여행할 때 듣는 음악</h2>

                <div class="audio-card">
                    <audio controls autoplay loop>
                        <source
                            src="media/music.mp3"
                            type="audio/mpeg"
                        >

                        현재 브라우저에서는 오디오를 재생할 수 없습니다.
                    </audio>

                    <p class="media-note">
                        브라우저 설정에 따라 자동재생이 차단될 수 있습니다.
                        이 경우 재생 버튼을 눌러주세요.
                    </p>
                </div>
            </section>

            <section>
                <h2>📸 기억에 남는 여행지</h2>

                <div class="trip-gallery">
                    <figure>
                        <img
                            src="media/australia.jpg"
                            alt="호주의 여행 풍경"
                            loading="lazy"
                        >

                        <figcaption>
                            <strong>호주</strong>

                            <p class="trip-card">
                                넓은 자연과 여유로운 분위기가 인상적이었던 여행지입니다.
                            </p>
                        </figcaption>
                    </figure>

                    <figure>
                        <img
                            src="media/croatia.jpeg"
                            alt="크로아티아의 여행 풍경"
                            loading="lazy"
                        >

                        <figcaption>
                            <strong>크로아티아</strong>

                            <p class="trip-card">
                                아름다운 바다와 유럽의 거리를 감상할 수 있었습니다.
                            </p>
                        </figcaption>
                    </figure>

                    <figure>
                        <img
                            src="media/malaysia.jpg"
                            alt="말레이시아의 여행 풍경"
                            loading="lazy"
                        >

                        <figcaption>
                            <strong>말레이시아</strong>

                            <p class="trip-card">
                                다양한 문화와 활기찬 도시 분위기를 경험했습니다.
                            </p>
                        </figcaption>
                    </figure>

                    <figure>
                        <img
                            src="media/vietnam.jpeg"
                            alt="베트남의 여행 풍경"
                            loading="lazy"
                        >

                        <figcaption>
                            <strong>베트남</strong>

                            <p class="trip-card">
                                맛있는 음식과 매력적인 거리 풍경이 기억에 남았습니다.
                            </p>
                        </figcaption>
                    </figure>

                    <figure>
                        <img
                            src="media/japan.jpg"
                            alt="일본의 여행 풍경"
                            loading="lazy"
                        >

                        <figcaption>
                            <strong>일본</strong>

                            <p class="trip-card">
                                전통적인 분위기와 현대적인 도시 풍경이 함께 인상적이었습니다.
                            </p>
                        </figcaption>
                    </figure>

                    <figure>
                        <img
                            src="media/belgium.jpg"
                            alt="벨기에의 여행 풍경"
                            loading="lazy"
                        >

                        <figcaption>
                            <strong>벨기에</strong>

                            <p class="trip-card">
                                고풍스러운 건축물과 아름다운 거리 풍경을 감상했습니다.
                            </p>
                        </figcaption>
                    </figure>
                </div>
            </section>

            <section>
                <h2>🎬 크로아티아 여행 영상</h2>

                <div class="video-card">
                    <video controls preload="metadata">
                        <source
                            src="media/croatia_travel.mp4"
                            type="video/mp4"
                        >

                        현재 브라우저에서는 영상을 재생할 수 없습니다.
                    </video>

                    <p>
                        크로아티아 여행 중 촬영한 풍경과 추억을
                        영상으로 기록했습니다.
                    </p>
                </div>
            </section>
        </div>
    </main>
 
    <footer>
        <p>
            <a href="index.html">
                홈으로 돌아가기
            </a>
        </p>

        <p>
            <small>
                임창우의 여행 앨범
            </small>
        </p>
    </footer>
    <script
        type="module"
        src="js/theme.js"
    ></script>
    <script src="js/showcase.js" defer></script>
</body>
</html>
